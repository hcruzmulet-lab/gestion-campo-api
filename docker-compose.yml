services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gestorcampo
      POSTGRES_USER: ${POSTGRES_USER:-gcuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gcpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gcuser}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: GestorCampo.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=gestorcampo;Username=${POSTGRES_USER:-gcuser};Password=${POSTGRES_PASSWORD:-gcpassword}
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD:-redispassword}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER:-gestorcampo}
      - Jwt__Audience=${JWT_AUDIENCE:-gestorcampo-clients}
      - Jwt__AccessTokenMinutes=15
      - Jwt__RefreshTokenDays=7
      - Email__Host=${SMTP_HOST}
      - Email__Port=${SMTP_PORT:-587}
      - Email__User=${SMTP_USER}
      - Email__Password=${SMTP_PASS}
      - Email__From=${SMTP_FROM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"  # TLS: add ssl_certificate config to nginx.conf before enabling
    depends_on:
      - api

  minio:
    image: minio/minio:latest
    container_name: gestorcampo-minio
    command: server /data --console-address ":9001"
    ports:
      - "9010:9000"
      - "9011:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: gestorcampo-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP — appsettings.Development.json Email:Port
      - "8025:8025"  # Web UI — http://localhost:8025

volumes:
  postgres_data:
  redis_data:
  minio-data:
